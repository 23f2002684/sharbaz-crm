version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno_password
      POSTGRES_DB: xeno_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  crm_backend:
    build:
      context: ./crm_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://xeno:xeno_password@db:5432/xeno_crm
      - REDIS_URL=redis://redis:6379/0
      - CHANNEL_SERVICE_URL=http://channel_service:8001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./crm_backend:/app

  celery_worker:
    build:
      context: ./crm_backend
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      - db
      - redis
      - crm_backend
    environment:
      - DATABASE_URL=postgresql://xeno:xeno_password@db:5432/xeno_crm
      - REDIS_URL=redis://redis:6379/0
      - CHANNEL_SERVICE_URL=http://channel_service:8001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./crm_backend:/app

  channel_service:
    build:
      context: ./channel_service
    ports:
      - "8001:8001"
    environment:
      - CRM_RECEIPT_URL=http://crm_backend:8000/api/receipt

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - crm_backend

volumes:
  postgres_data:
